# 16-retrain-job.yaml: manual retraining job template, apply when a new model run is needed
apiVersion: batch/v1
kind: Job
metadata:
  name: retrain-mlp
  namespace: mlops
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: retrain-mlp
    spec:
      restartPolicy: Never
      containers:
        - name: retrain
          image: project25-training-manager:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - scripts.retrain
            - --config
            - configs/config.yaml
          envFrom:
            - secretRef:
                name: data-pipeline-secrets
            - configMapRef:
                name: data-pipeline-config
          env:
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow:5000
            - name: S3_ENDPOINT
              value: http://minio:9000
          volumeMounts:
            - name: online-service-config
              mountPath: /app/configs/config.yaml
              subPath: config.yaml
            - name: artifacts
              mountPath: /mnt/block/artifacts
            - name: embedding
              mountPath: /mnt/block/embedding
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: online-service-config
          configMap:
            name: online-service-config
        - name: artifacts
          hostPath:
            path: /mnt/block/artifacts
            type: DirectoryOrCreate
        - name: embedding
          hostPath:
            path: /mnt/block/embedding
            type: DirectoryOrCreate
