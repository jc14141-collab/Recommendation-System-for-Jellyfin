apiVersion: v1
kind: Service
metadata:
  name: serving-staging
  namespace: mlops
  labels:
    app: serving-staging
spec:
  selector:
    app: serving-staging
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30083
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: serving-staging
  namespace: mlops
  labels:
    app: serving-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serving-staging
  template:
    metadata:
      labels:
        app: serving-staging
    spec:
      containers:
        - name: serving-staging
          image: songchenxue/project25-serving-multiworker:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: serving-staging-config
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
---
