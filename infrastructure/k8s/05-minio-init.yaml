# 05-minio-init.yaml: one-shot bucket initialization job for MinIO
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: mlops
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        app: minio-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until mc alias set myminio http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "Waiting for MinIO to become reachable..."
                sleep 5
              done
              mc mb --ignore-existing myminio/warehouse
              mc mb --ignore-existing myminio/raw
              mc mb --ignore-existing myminio/cleaned
              mc mb --ignore-existing myminio/artifacts
              mc mb --ignore-existing myminio/embedding
