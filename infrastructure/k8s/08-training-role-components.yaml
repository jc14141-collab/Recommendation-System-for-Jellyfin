# 08-training-role-components.yaml: reference mapping for training-role containerization inputs
apiVersion: v1
kind: ConfigMap
metadata:
  name: training-role-components
  namespace: mlops
data:
  services: |
    trainer:
      docker_source:
        - ../../training/Dockerfile
        - ../../training/scripts/retrain.py
        - ../../training/configs/config.yaml
      kubernetes_equivalent:
        - CronJob
      implemented_in_repo: k8s/16-training-retrain-cronjob.yaml
      integration_targets:
        - mlflow
        - minio
      status: implemented
    training_manager:
      docker_source:
        - ../../training/api/server.py
        - ../../training/frontend/index.html
      kubernetes_equivalent:
        - Deployment
        - Service
      implemented_in_repo: k8s/15-training-manager.yaml
      integration_targets:
        - mlflow
        - minio
        - recommender-serving
      status: implemented
