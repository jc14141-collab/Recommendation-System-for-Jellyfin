# 14-online-service-api.yaml: online recommendation API with model artifact mounts
apiVersion: v1
kind: Service
metadata:
  name: online-service-api
  namespace: mlops
spec:
  selector:
    app: online-service-api
  ports:
    - name: http
      port: 18080
      targetPort: 18080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-service-api
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: online-service-api
  template:
    metadata:
      labels:
        app: online-service-api
    spec:
      containers:
        - name: online-service-api
          image: songchenxue/online_service:v1.1
          imagePullPolicy: IfNotPresent
          command:
            - gunicorn
            - -w
            - "2"
            - -b
            - 0.0.0.0:18080
            - scripts.api.candidate_api:create_app()
          envFrom:
            - secretRef:
                name: data-pipeline-secrets
            - configMapRef:
                name: data-pipeline-config
          env:
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: MINIO_ENDPOINT
              value: http://minio:9000
          ports:
            - containerPort: 18080
              name: http
          volumeMounts:
            - name: online-service-config
              mountPath: /app/scripts/config/config.yaml
              subPath: config.yaml
            - name: artifacts
              mountPath: /data/artifacts
              readOnly: true
            - name: embedding
              mountPath: /data/embedding
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 18080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 18080
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: online-service-config
          configMap:
            name: online-service-config
        - name: artifacts
          hostPath:
            path: /mnt/block/artifacts
            type: DirectoryOrCreate
        - name: embedding
          hostPath:
            path: /mnt/block/embedding
            type: DirectoryOrCreate
