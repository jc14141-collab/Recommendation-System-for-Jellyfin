# 03-jellyfin.yaml: legacy Kubernetes Jellyfin manifest retained for reference only; no longer applied by the main bootstrap flow
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config
  namespace: mlops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: mlops
spec:
  selector:
    app: jellyfin
  ports:
    - name: http
      port: 8096
      targetPort: 8096
      nodePort: 30096
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8096
              name: http
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: jellyfin-config
              mountPath: /config
            - name: jellyfin-movies
              mountPath: /media/movies
          readinessProbe:
            httpGet:
              path: /
              port: 8096
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8096
            initialDelaySeconds: 40
            periodSeconds: 15
      volumes:
        - name: jellyfin-config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: jellyfin-movies
          hostPath:
            path: /mnt/block/movies
            type: DirectoryOrCreate
