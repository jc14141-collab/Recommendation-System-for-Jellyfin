# 09-serving-role-components.yaml: reference mapping for serving-role services from the serving repository
apiVersion: v1
kind: ConfigMap
metadata:
  name: serving-role-components
  namespace: mlops
data:
  services: |
    multiworker:
      docker_source:
        - ../../serving/serving/multiworker/Dockerfile
        - ../../serving/serving/multiworker/app/main.py
        - ../../serving/serving/multiworker/app/recommender.py
      kubernetes_equivalent:
        - ConfigMap
        - Deployment
        - Service
      implemented_in_repo:
        - k8s/17-serving-config.yaml
        - k8s/18-serving-multiworker.yaml
      integration_targets:
        - minio
        - training-manager
      status: implemented
    baseline:
      kubernetes_equivalent:
        - Deployment
        - Service
      status: planned
    onnx:
      kubernetes_equivalent:
        - Deployment
        - Service
      status: planned
    onnx_multiworker:
      kubernetes_equivalent:
        - Deployment
        - Service
      status: planned
    torch_model:
      kubernetes_equivalent:
        - Deployment
        - Service
      status: planned
    torch_multiworker:
      kubernetes_equivalent:
        - Deployment
        - Service
      status: planned
