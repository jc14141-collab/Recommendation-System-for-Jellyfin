name: Serving CI/CD

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - "serving/**"
      - "infrastructure/k8s/09-serving-onnx.yaml"
      - ".github/workflows/serving-ci-cd.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/project25-serving-onnx

jobs:
  build-and-deploy-serving:
    if: ${{ hashFiles('serving/onnx/Dockerfile') != '' && hashFiles('infrastructure/k8s/09-serving-onnx.yaml') != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push serving image
        uses: docker/build-push-action@v6
        with:
          context: ./serving/onnx
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Load kubeconfig
        shell: bash
        run: |
          mkdir -p "${HOME}/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "${HOME}/.kube/config"
          chmod 600 "${HOME}/.kube/config"

      - name: Deploy serving to staging
        shell: bash
        run: |
          sed "s|project25-serving-onnx:latest|${IMAGE_NAME}:${GITHUB_SHA}|g" infrastructure/k8s/09-serving-onnx.yaml | kubectl apply -f -
          kubectl rollout status deployment/recommender-serving -n mlops --timeout=300s

      - name: Smoke test serving health
        shell: bash
        run: |
          kubectl get svc recommender-serving -n mlops
          kubectl get pods -n mlops -l app=recommender-serving

  serving-workflow-placeholder:
    if: ${{ hashFiles('serving/onnx/Dockerfile') == '' || hashFiles('infrastructure/k8s/09-serving-onnx.yaml') == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain why serving CI/CD was skipped
        run: |
          echo "Serving CI/CD is defined but skipped because the repo does not yet contain both:"
          echo " - serving/onnx/Dockerfile"
          echo " - infrastructure/k8s/09-serving-onnx.yaml"
          echo "Add those files to activate the workflow."
