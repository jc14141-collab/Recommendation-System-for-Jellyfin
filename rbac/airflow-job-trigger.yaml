apiVersion: v1
kind: ServiceAccount
metadata:
  name: airflow-job-trigger
  namespace: airflow
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-job-trigger-role
  namespace: mlops
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-job-trigger-binding
  namespace: mlops
subjects:
  - kind: ServiceAccount
    name: airflow-job-trigger
    namespace: airflow
roleRef:
  kind: Role
  name: airflow-job-trigger-role
  apiGroup: rbac.authorization.k8s.io